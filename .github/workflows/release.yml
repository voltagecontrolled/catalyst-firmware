name: Build and Release

on:
  push:
    tags:
      - 'catalyst-v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi ninja-build python3-numpy

      - name: Configure
        run: cmake -B build -GNinja

      - name: Run tests
        run: make -f tests/Makefile

      - name: Build firmware
        run: cmake --build build

      - name: Build WAV
        run: cmake --build build --target f401.wav

      - name: Rename WAV
        run: cp build/f401/f401.wav ${{ github.ref_name }}.wav

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ github.ref_name }}.wav
          fail_on_unmatched_files: true
