name: Build and Release

on:
  push:
    tags:
      - 'catalyst-v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi ninja-build python3-numpy

      - name: Run tests
        run: make -f tests/Makefile

      # ── Build: CatSeq + CatCon (default) ─────────────────────────────────
      - name: Configure (catseq-catcon)
        run: cmake -B build_catcon -GNinja

      - name: Build firmware (catseq-catcon)
        run: cmake --build build_catcon

      - name: Build WAV (catseq-catcon)
        run: cmake --build build_catcon --target f401.wav

      - name: Rename WAV (catseq-catcon)
        run: cp build_catcon/f401/f401.wav ${{ github.ref_name }}-catseq-catcon.wav

      # ── Build: CatSeq + VoltSeq (CATALYST_SECOND_MODE=1) ─────────────────
      - name: Configure (catseq-voltseq)
        run: cmake -B build_voltseq -GNinja -DCATALYST_SECOND_MODE=1

      - name: Build firmware (catseq-voltseq)
        run: cmake --build build_voltseq

      - name: Build WAV (catseq-voltseq)
        run: cmake --build build_voltseq --target f401.wav

      - name: Rename WAV (catseq-voltseq)
        run: cp build_voltseq/f401/f401.wav ${{ github.ref_name }}-catseq-voltseq.wav

      # ── Release ───────────────────────────────────────────────────────────
      - name: Resolve release notes path
        id: notes
        run: |
          BASE=$(echo "${{ github.ref_name }}" | sed 's/-alpha[0-9]*$//' | sed 's/-rc[0-9]*$//')
          echo "path=docs/release-notes/${BASE}.md" >> $GITHUB_OUTPUT

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ github.ref_name }}-catseq-catcon.wav
            ${{ github.ref_name }}-catseq-voltseq.wav
          fail_on_unmatched_files: true
          body_path: ${{ steps.notes.outputs.path }}
          prerelease: ${{ contains(github.ref_name, '-alpha') || contains(github.ref_name, '-rc') }}
