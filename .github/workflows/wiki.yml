name: Sync Wiki

on:
  push:
    branches:
      - main
      - voltseq
    paths:
      - 'docs/wiki/NEW_FEATURES.md'
      - 'docs/wiki/VOLTSEQ.md'
      - 'docs/wiki/CATSEQ.md'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Push to wiki
        run: |
          git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.wiki.git wiki-repo
          cp docs/wiki/CATSEQ.md wiki-repo/Catalyst-Sequencer.md
          cp docs/wiki/VOLTSEQ.md wiki-repo/Catalyst-VoltSeq.md
          cd wiki-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Catalyst-Sequencer.md Catalyst-VoltSeq.md
          git diff --cached --quiet || git commit -m "Sync wiki from docs/wiki"
          git push
