name: Sync Wiki

on:
  push:
    branches:
      - main
    paths:
      - 'wiki/NEW_FEATURES.md'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Push to wiki
        run: |
          git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.wiki.git wiki-repo
          cp wiki/NEW_FEATURES.md wiki-repo/New-Features.md
          cd wiki-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add New-Features.md
          git diff --cached --quiet || git commit -m "Sync New Features from main"
          git push
